
name: kanban-backend
services:
    backend:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: kanban-backend-container
      ports:
        - "3000:5000"
      environment:
        MONGODB_URI: mongodb://mongodb:27017/kanban
        MONGODB_USERNAME: avika@2002
        MONGODB_PASSWORD: 1911
      depends_on:
        - mongodb

    mongodb:
      image: mongo:7
      environment:
        MONGO_INITDB_ROOT_USERNAME: avika@2002
        MONGO_INITDB_ROOT_PASSWORD: 1911
        MONGO_INITDB_DATABASE: kanban
      ports:
        - "27017:27017"
